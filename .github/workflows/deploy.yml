name: Build and Push to ECR

on:
  push:
    branches: ["main"]

# 동일한 워크플로우가 동시에 실행될 때 충돌 방지
# 새 커밋이 push되면 이전에 실행 중이던 워크플로우를 자동 취소
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 워크플로우 전체에서 공통으로 사용할 환경변수
env:
  AWS_REGION: ap-south-2
  ECR_REGISTRY: 458894893383.dkr.ecr.ap-south-2.amazonaws.com
  # ECR 레포지토리명 (보안 정보 아니므로 여기서 직접 관리)
  NGINX_REPO: member-nginx
  FASTAPI_REPO: member-fastapi

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      # ArgoCD GitOps: 워크플로우가 manifest 파일 변경 후
      # 레포지토리에 직접 커밋/푸시하려면 쓰기 권한 필요
      contents: write

    steps:
      # -------------------------------------------------------
      # 1. 소스코드 체크아웃
      # -------------------------------------------------------
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 → 전체 Git 히스토리를 가져옴
          # 이후 git pull --rebase 시 충돌 방지를 위해 필요
          fetch-depth: 0

      # -------------------------------------------------------
      # 2. AWS 자격증명 설정
      # ECR 로그인 및 이미지 push를 위해 AWS 인증 선행 필요
      # -------------------------------------------------------
      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # -------------------------------------------------------
      # 3. ECR 로그인
      # AWS CLI로 임시 토큰을 발급받아 Docker 로그인에 사용
      # -------------------------------------------------------
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin $ECR_REGISTRY

      # -------------------------------------------------------
      # 4. Docker 이미지 빌드 & ECR 푸시
      # - proxy-v$SHORT_SHA 태그: ArgoCD가 버전 추적에 사용
      # - proxy-latest 태그: 항상 최신 이미지를 가리킴
      # -------------------------------------------------------
      - name: Build & Push member-management-Service
        run: |
          # github.sha(40자리)에서 앞 7자리만 사용 (예: a1b2c3d)
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "Building with tag: proxy-v$SHORT_SHA"

          # Nginx 이미지 빌드 & 푸시 (./nginx 디렉토리의 Dockerfile 사용)
          docker build -t $ECR_REGISTRY/$NGINX_REPO:proxy-v$SHORT_SHA ./nginx
          docker push $ECR_REGISTRY/$NGINX_REPO:proxy-v$SHORT_SHA
          docker build -t $ECR_REGISTRY/$NGINX_REPO:proxy-latest ./nginx
          docker push $ECR_REGISTRY/$NGINX_REPO:proxy-latest

          # FastAPI 이미지 빌드 & 푸시 (루트 디렉토리의 Dockerfile 사용)
          docker build -t $ECR_REGISTRY/$FASTAPI_REPO:proxy-v$SHORT_SHA .
          docker push $ECR_REGISTRY/$FASTAPI_REPO:proxy-v$SHORT_SHA
          docker build -t $ECR_REGISTRY/$FASTAPI_REPO:proxy-latest .
          docker push $ECR_REGISTRY/$FASTAPI_REPO:proxy-latest

      # -------------------------------------------------------
      # 5. K8s manifest 이미지 태그 자동 업데이트 (GitOps 핵심)
      # sed로 deployment.yaml 내 이미지 태그를 새 버전으로 교체
      # ArgoCD가 이 변경을 감지해서 자동 배포를 트리거함
      # -------------------------------------------------------
      - name: Kubernetes Manifest 이미지 버전 자동 업데이트
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)

          # 예: .../member-nginx:proxy-v1234567 → .../member-nginx:proxy-va2b3c4d
          sed -i "s|$ECR_REGISTRY/$NGINX_REPO:proxy-v.*|$ECR_REGISTRY/$NGINX_REPO:proxy-v$SHORT_SHA|g" k8s/deployment.yaml
          sed -i "s|$ECR_REGISTRY/$FASTAPI_REPO:proxy-v.*|$ECR_REGISTRY/$FASTAPI_REPO:proxy-v$SHORT_SHA|g" k8s/deployment.yaml

      # -------------------------------------------------------
      # 6. 변경된 manifest를 레포지토리에 커밋 & 푸시
      # ArgoCD는 이 커밋을 감지해 EKS에 자동 반영함
      # -------------------------------------------------------
      - name: Commit and Push Changes
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add k8s/deployment.yaml

          # 실제 변경사항이 있을 때만 커밋 (불필요한 빈 커밋 방지)
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
            # [skip ci]: 이 커밋으로 인해 워크플로우가 재실행되지 않도록 방지
            git commit -m "Auto-deploy: update image tags to v$SHORT_SHA [skip ci]"

            # 다른 작업과 충돌 방지를 위해 최신 상태 반영 후 푸시
            git pull --rebase origin main
            git push origin main
          fi