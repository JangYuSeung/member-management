server {
    listen 80;

    location = /management {
        root /usr/share/nginx/html;
        try_files /management/index.html =404;
    }

    location = /management/ {
        root /usr/share/nginx/html;
        try_files /management/index.html =404;
    }

    location /management/ {
        proxy_pass http://fastapi-service:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://fastapi-service:8000/health;
        proxy_set_header Host $host;
    }
}